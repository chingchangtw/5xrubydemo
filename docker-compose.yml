services:
  frontend:
    build: ./src/frontend
    ports: ["3000:3000"]
    env_file: .env

  backend:
    build: ./src/backend
    ports: ["8000:8000"]
    env_file: .env

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
